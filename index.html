<!DOCTYPE html>
<html>

<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width">
  <title>4.6 datalist tags</title>
  <link href="style.css" rel="stylesheet" type="text/css" />
</head>

<body>
  <!--example form with a datalist-->
  <form name="example" action="#" method="POST">
      <label for="language">Select or type a language:</label>
      <input list="languages" name="language">
      <datalist id="languages">
          <option value="English">
          <option value="Spanish">
          <option value="Bangla">
          <option value="Chinese">
      </datalist>
      <br><br>
      <input type="submit">
  </form>

  <!--exercise 1-->
 <form name="sneakersForm" action="#" method="POST">
      <label for="sneaker">Select or type a sneaker brand:</label>
      <input list="sneakers" id="sneaker" name="sneaker">
      <datalist id="sneakers">
          <option value="Nike">
          <option value="New Balance">
          <option value="Sketchers">
          <option value="Adidas">
          <option value="Puma">
          <option value="Reebok">
          <option value="Converse">
      </datalist>
      <br><br>
      <input type="submit">
  </form>

  <!--exercise 2-->
 <form name="citiesForm" action="#" method="POST">
      <label for="city">Select or type a city:</label>
      <input list="cities" id="city" name="city">
      <datalist id="cities">
          <option value="New York">
          <option value="Chicago">
          <option value="Baltimore">
          <option value="Philadelphia">
          <option value="Los Angeles">
          <option value="Miami">
          <option value="Houston">
          <option value="Dallas">
      </datalist>
      <br><br>
      <input type="submit">
  </form>

  <!--exercise 3-->
  <form name="artistsForm" action="#" method="POST">
      <label for="artist">Select or type your favorite music artist:</label>
      <input list="artists" id="artist" name="artist">
      <datalist id="artists">
          <option value="Taylor Swift">
          <option value="Bad Bunny">
          <option value="Drake">
          <option value="Shakira">
          <option value="The Weeknd">
          <option value="Ariana Grande">
      </datalist>
      <br><br>
      <input type="submit">
  </form>

</body>

</html>
